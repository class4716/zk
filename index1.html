<html lang="zh">

            padding: 0.1rem 1rem;
            border-radius: 30px;

            letter-spacing: 0.3px;

        .question-grid {
            display: flex;

        }
        .q-item {
            background: #fafdff;
            border-radius: 18px;

            transition: 0.1s;
            display: flex;

            align-items: flex-start;
            gap: 0.6rem;
        }
        .q-item:hover {
            border-color: #b2c8df;
            background: #ffffff;
        }

            font-weight: 600;
            color: #1f3a6b;
            font-size: 0.95rem;
            padding-top: 0.1rem;
        }

            flex: 1;
            min-width: 200px;
        }
        .q-text {
            font-size: 1.02rem;
            line-height: 1.5;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #0d1d30;
        }

            flex-wrap: wrap;
            gap: 0.2rem 1.6rem;
            font-size: 0.98rem;
            padding: 0.1rem 0;

            display: inline-flex;

            gap: 6px;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 30px;
            transition: 0.05s;

            width: 16px;
            height: 16px;
            cursor: pointer;

            border-radius: 30px;

            padding-top: 1.5rem;

        }

            background: #f2f8ff;
        }

            border-radius: 60px;
            padding: 0.4rem 1.8rem;

            color: #0f2a4a;

            color: white;
            padding: 0.1rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
        }

            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #4d677f;
            border-top: 1px dashed #cddbea;
            padding-top: 1.2rem;
        }

            border-radius: 28px;
            padding: 1.2rem 2rem;
            border: 1px solid #d3e0f0;
        }

            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            color: #1f3a6b;

            padding: 0.2rem 0;
            text-align: center;
            font-size: 0.85rem;
            border: 1px solid #d0def0;
        }

            .q-item { padding: 0.8rem 1rem; }
            .header h1 { font-size: 1.6rem; }

    </style>
</head>

            { q: '“不畏浮云遮望眼” 的下一句？', opts: ['A. 自缘身在最高层', 'B. 只缘身在此山中', 'C. 不识庐山真面目', 'D. 远近高低各不同'], ans: 0 },
            { q: '《爱莲说》中 “出淤泥而不染” 描写的是？', opts: ['A. 莲花', 'B. 兰花', 'C. 菊花', 'D. 梅花'], ans: 0 },
            { q: '“独在异乡为异客” 作者是？', opts: ['A. 王维', 'B. 李白', 'C. 杜甫', 'D. 白居易'], ans: 0 },
            { q: '《邹忌讽齐王纳谏》中 “吾妻之美我者” 下一句？', opts: ['A. 私我也', 'B. 畏我也', 'C. 欲有求于我也', 'D. 皆以美于徐公'], ans: 0 },
            { q: '“夕阳西下，断肠人在天涯” 出自？', opts: ['A. 《天净沙·秋思》', 'B. 《秋词》', 'C. 《长相思》', 'D. 《苏幕遮》'], ans: 0 },
            { q: '《记承天寺夜游》作者是？', opts: ['A. 苏轼', 'B. 苏辙', 'C. 苏洵', 'D. 欧阳修'], ans: 0 },
            { q: '“山重水复疑无路” 下一句？', opts: ['A. 柳暗花明又一村', 'B. 飞入寻常百姓家', 'C. 乱花渐欲迷人眼', 'D. 浅草才能没马蹄'], ans: 0 },
            { q: '《木兰诗》中 “万里赴戎机” 下一句？', opts: ['A. 关山度若飞', 'B. 朔气传金柝', 'C. 寒光照铁衣', 'D. 策勋十二转'], ans: 0 },
            { q: '“落红不是无情物” 作者是？', opts: ['A. 龚自珍', 'B. 郑板桥', 'C. 赵翼', 'D. 谭嗣同'], ans: 0 },
            { q: '《岳阳楼记》中 “先天下之忧而忧” 下一句？', opts: ['A. 后天下之乐而乐', 'B. 先天下之乐而乐', 'C. 后天下之忧而忧', 'D. 乐以天下'], ans: 0 },
            { q: '“举杯邀明月” 出自李白的？', opts: ['A. 《月下独酌》', 'B. 《将进酒》', 'C. 《行路难》', 'D. 《宣州谢朓楼饯别》'], ans: 0 },
            { q: '《醉翁亭记》中 “山水之乐” 下一句？', opts: ['A. 得之心而寓之酒也', 'B. 在乎山水之间也', 'C. 而乐亦无穷也', 'D. 四时之景不同'], ans: 0 },
            { q: '“海日生残夜” 下一句？', opts: ['A. 江春入旧年', 'B. 乡书何处达', 'C. 归雁洛阳边', 'D. 风正一帆悬'], ans: 0 },
            { q: '《鱼我所欲也》中 “二者不可得兼” 下一句？', opts: ['A. 舍鱼而取熊掌者也', 'B. 舍生而取义者也', 'C. 舍生取义', 'D. 舍利取义'], ans: 0 },
            { q: '“大漠孤烟直” 下一句？', opts: ['A. 长河落日圆', 'B. 落日长河圆', 'C. 长河落日红', 'D. 落日大漠圆'], ans: 0 },
            { q: '“欲穷千里目” 下一句？', opts: ['A. 更上一层楼', 'B. 黄河入海流', 'C. 山穷水复疑无路', 'D. 柳暗花明又一村'], ans: 0 },
        ];

        // 英语 (40题) 基础语法/词汇/情景
        const englishPool = [
            { q: '— What’s your favorite subject? — My favorite subject is _______.', opts: ['A. math', 'B. the math', 'C. maths', 'D. a math'], ans: 0 },
            { q: 'She _______ a teacher in 2020.', opts: ['A. become', 'B. became', 'C. is becoming', 'D. has become'], ans: 1 },
            { q: 'There _______ a lot of trees in the park.', opts: ['A. is', 'B. are', 'C. was', 'D. were'], ans: 1 },
            { q: '— _______ do you go to the library? — Twice a week.', opts: ['A. How long', 'B. How often', 'C. How soon', 'D. How much'], ans: 1 },
            { q: 'The book _______ is on the desk is mine.', opts: ['A. which', 'B. who', 'C. whom', 'D. what'], ans: 0 },
            { q: 'I _______ to the cinema yesterday.', opts: ['A. go', 'B. went', 'C. have gone', 'D. was going'], ans: 1 },
            { q: 'If it _______ tomorrow, we will stay at home.', opts: ['A. rain', 'B. rains', 'C. will rain', 'D. rained'], ans: 1 },
            { q: 'She is _______ girl in our class.', opts: ['A. taller', 'B. tallest', 'C. the taller', 'D. the tallest'], ans: 3 },
            { q: '— Could you help me? — _______.', opts: ['A. Yes, please', 'B. Sure, no problem', 'C. You’re welcome', 'D. That’s right'], ans: 1 },
            { q: 'He _______ in Beijing for 5 years.', opts: ['A. live', 'B. lived', 'C. has lived', 'D. was living'], ans: 2 },
            { q: '_______ a beautiful day!', opts: ['A. How', 'B. What', 'C. Where', 'D. When'], ans: 1 },
            { q: 'I like music _______ I can dance to.', opts: ['A. what', 'B. who', 'C. that', 'D. whom'], ans: 2 },
            { q: 'My mother _______ breakfast at 7:00 every day.', opts: ['A. make', 'B. makes', 'C. made', 'D. is making'], ans: 1 },
            { q: '— _______ is your father? — He is a doctor.', opts: ['A. Who', 'B. What', 'C. Which', 'D. Whose'], ans: 1 },
            { q: 'I have _______ interesting book.', opts: ['A. a', 'B. an', 'C. the', 'D. /'], ans: 1 },
            { q: 'We _______ to the park if it is sunny.', opts: ['A. go', 'B. went', 'C. will go', 'D. have gone'], ans: 2 },
            { q: 'She is _______ at English than me.', opts: ['A. good', 'B. better', 'C. best', 'D. well'], ans: 1 },
            { q: '— Thank you very much. — _______.', opts: ['A. No, thanks', 'B. You’re welcome', 'C. That’s OK', 'D. All right'], ans: 1 },
            { q: 'My sister _______ a new bike yesterday.', opts: ['A. buy', 'B. bought', 'C. has bought', 'D. was buying'], ans: 1 },
            { q: 'The teacher said the earth _______ around the sun.', opts: ['A. go', 'B. goes', 'C. went', 'D. is going'], ans: 1 },
            { q: '— _______ do you like summer? — Because I can swim.', opts: ['A. Why', 'B. What', 'C. When', 'D. Where'], ans: 0 },
            { q: 'I _______ my homework when the phone rang.', opts: ['A. do', 'B. did', 'C. was doing', 'D. have done'], ans: 2 },
            { q: 'There is _______ water in the bottle.', opts: ['A. little', 'B. a little', 'C. few', 'D. a few'], ans: 1 },
            { q: '— Can you speak English? — Yes, but only _______.', opts: ['A. a lot', 'B. a little', 'C. little', 'D. few'], ans: 1 },
            { q: 'I’ll call you _______ I arrive home.', opts: ['A. while', 'B. as soon as', 'C. until', 'D. though'], ans: 1 },
            { q: 'He _______ to school by bus every day.', opts: ['A. go', 'B. goes', 'C. went', 'D. is going'], ans: 1 },
            { q: 'The movie is _______ interesting than that one.', opts: ['A. much', 'B. more', 'C. most', 'D. very'], ans: 1 },
            { q: '— _______ you like some coffee? — Yes, please.', opts: ['A. Do', 'B. Would', 'C. Are', 'D. Could'], ans: 1 },
            { q: 'I _______ a new phone last week.', opts: ['A. buy', 'B. bought', 'C. have bought', 'D. was buying'], ans: 1 },
            { q: 'She _______ to Japan twice.', opts: ['A. go', 'B. went', 'C. has been', 'D. is going'], ans: 2 },
            { q: 'The window _______ by the boy.', opts: ['A. break', 'B. broke', 'C. was broken', 'D. is broken'], ans: 2 },
            { q: '_______ you please pass me the salt?', opts: ['A. Could', 'B. Must', 'C. Should', 'D. Need'], ans: 0 },
            { q: 'I’m looking forward _______ you.', opts: ['A. to see', 'B. to seeing', 'C. seeing', 'D. see'], ans: 1 },
            { q: 'He is _______ young to go to school.', opts: ['A. too', 'B. so', 'C. very', 'D. enough'], ans: 0 },
            { q: 'She has _______ a lot of money.', opts: ['A. spend', 'B. spent', 'C. spending', 'D. spends'], ans: 1 },
            { q: 'The teacher told us _______ late again.', opts: ['A. not be', 'B. not to be', 'C. don’t be', 'D. not being'], ans: 1 },
            { q: '_______ the weather is fine, we will go for a picnic.', opts: ['A. If', 'B. Unless', 'C. Although', 'D. Because'], ans: 0 },
            { q: 'The ruler is _______ than that one.', opts: ['A. long', 'B. longer', 'C. longest', 'D. more long'], ans: 1 },
            { q: 'He enjoys _______ football after school.', opts: ['A. play', 'B. to play', 'C. playing', 'D. played'], ans: 2 },
            { q: '— _______ is the population of China? — About 1.4 billion.', opts: ['A. How many', 'B. How much', 'C. What', 'D. Which'], ans: 2 },
        ];

        // 组装 120 题 (数学40, 语文40, 英语40)
        const mathSelected = mathPool.slice(0, 40);
        const chineseSelected = chinesePool.slice(0, 40);
        const englishSelected = englishPool.slice(0, 40);
        const combined = [...mathSelected, ...chineseSelected, ...englishSelected];
        const subjectMap = [];
        for (let i = 0; i < mathSelected.length; i++) subjectMap.push('数学');
        for (let i = 0; i < chineseSelected.length; i++) subjectMap.push('语文');
        for (let i = 0; i < englishSelected.length; i++) subjectMap.push('英语');

        const finalQuestions = combined.map((q, idx) => ({
            id: idx + 1,
            subject: subjectMap[idx],
            text: q.q,
            options: q.opts,
            ans: q.ans
        }));

        // 存储用户答案
        const userAnswers = new Array(120).fill(null);

        // 渲染
        const container = document.getElementById('questionContainer');
        let html = '';
        let currentSubject = '';
        for (let i = 0; i < finalQuestions.length; i++) {
            const q = finalQuestions[i];
            if (q.subject !== currentSubject) {
                currentSubject = q.subject;
                html += `<div class="subject-divider"><h2>${currentSubject}</h2><span class="badge">${currentSubject === '数学' ? '一元二次方程 · 二次函数' : currentSubject === '语文' ? '古诗 · 文言文' : '基础·语法'}</span></div>`;
            }
            const optLabels = ['A', 'B', 'C', 'D'];
            let optsHtml = q.options.map((opt, idx) => {
                const letter = optLabels[idx];
                return `<label><input type="radio" name="q${q.id}" value="${idx}" data-qid="${q.id}"> ${opt}</label>`;
            }).join('');

            html += `
                <div class="q-item" id="qitem-${q.id}">
                    <div class="q-num">${q.id}.</div>
                    <div class="q-body">
                        <div class="q-text">${q.text}</div>
                        <div class="options">${optsHtml}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // 绑定 change 事件
        document.querySelectorAll('input[type="radio"]').forEach(input => {
            input.addEventListener('change', function(e) {
                const qid = parseInt(this.dataset.qid);
                const val = parseInt(this.value);
                userAnswers[qid - 1] = val;
                updateAnsweredCount();
                // 移除同组其他高亮
                const parent = this.closest('.options');
                parent.querySelectorAll('label').forEach(lb => lb.classList.remove('selected-option'));
                this.closest('label').classList.add('selected-option');
            });
        });

        function updateAnsweredCount() {
            const count = userAnswers.filter(a => a !== null).length;
            document.getElementById('answeredCount').textContent = count;
        }

        // 提交
        document.getElementById('submitBtn').addEventListener('click', function() {
            let correct = 0;
            for (let i = 0; i < finalQuestions.length; i++) {
                const userAns = userAnswers[i];
                if (userAns !== null && userAns === finalQuestions[i].ans) {
                    correct++;
                }
            }
            document.getElementById('scoreDisplay').textContent = correct;
            document.getElementById('resultBox').style.display = 'inline-flex';
            // 滚动到结果
            document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // 清空
        document.getElementById('clearAllBtn').addEventListener('click', function() {
            if (!confirm('确定清空所有答案吗？')) return;
            document.querySelectorAll('input[type="radio"]').forEach(input => {
                input.checked = false;
                input.closest('label')?.classList.remove('selected-option');
            });
            for (let i = 0; i < userAnswers.length; i++) userAnswers[i] = null;
            updateAnsweredCount();
            document.getElementById('resultBox').style.display = 'none';
        });

        // 生成参考答案 (独立)
        const answerGrid = document.getElementById('answerGrid');
        let refHtml = '';
        for (let i = 0; i < finalQuestions.length; i++) {
            const letter = String.fromCharCode(65 + finalQuestions[i].ans);
            refHtml += `<div class="ref-item">${i+1}. ${letter}</div>`;
        }
        answerGrid.innerHTML = refHtml;

        // 统计学科数量
        document.getElementById('mathCount').textContent = mathSelected.length;
        document.getElementById('chineseCount').textContent = chineseSelected.length;
        document.getElementById('englishCount').textContent = englishSelected.length;

        // 默认折叠参考答案
        document.getElementById('answerDetails').open = false;

        // 如果url有hash #answer 则展开
        if (window.location.hash === '#answer') {
            document.getElementById('answerDetails').open = true;
        }

    })();
</script>
</body>
</html>
