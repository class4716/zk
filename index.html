<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中考模拟 · 120题 · 错题本（含解析）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f8fe;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.8rem 1.2rem;
            color: #142433;
        }
        .paper {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 16px 40px -10px rgba(18, 35, 60, 0.12);
            padding: 2rem 2rem 2.5rem;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 4px solid #1f3a6b;
            padding-bottom: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .meta {
            background: #eef3fa;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #1f3a6b;
            font-weight: 500;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 2rem;
            background: #f8faff;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
            border: 1px solid #dce5f0;
            font-size: 0.95rem;
            align-items: center;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats .num {
            font-weight: 700;
            color: #1f3a6b;
        }
        .stats .badge-error {
            background: #c5283d;
            color: white;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-left: 4px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin: 1.8rem 0 1.2rem 0;
            padding: 0.6rem 0;
            border-top: 1px solid #d7e1ee;
            border-bottom: 1px solid #d7e1ee;
            gap: 0.8rem;
        }
        .action-bar .left {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            background: #e6eef9;
            border: none;
            padding: 0.4rem 1.4rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a2f4f;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: #1f3a6b;
            color: white;
            box-shadow: 0 4px 10px -4px #1a2f4f66;
        }
        .btn-primary:hover { background: #122b52; }
        .btn-outline { background: white; border: 1px solid #b7cade; }
        .btn-outline:hover { background: #f2f8ff; }
        .btn-danger { background: #c5283d; color: white; }
        .btn-danger:hover { background: #a02030; }
        .btn-success { background: #1f7b4d; color: white; }
        .btn-success:hover { background: #15633d; }
        .result-box {
            background: #e5effa;
            border-radius: 60px;
            padding: 0.3rem 1.6rem;
            font-weight: 600;
            color: #0f2a4a;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .result-box .score {
            background: #1f3a6b;
            color: white;
            padding: 0.1rem 1rem;
            border-radius: 40px;
        }
        .subject-divider {
            display: flex;
            align-items: baseline;
            gap: 14px;
            margin: 1.8rem 0 1rem 0;
        }
        .subject-divider h2 {
            font-weight: 600;
            font-size: 1.5rem;
            color: #0f263f;
        }
        .subject-divider .badge {
            background: #1f3a6b;
            color: white;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            letter-spacing: 0.3px;
        }
        .question-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .q-item {
            background: #fafdff;
            border-radius: 18px;
            padding: 0.9rem 1.4rem;
            border: 1px solid #e3ecf5;
            transition: 0.1s;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.4rem;
        }
        .q-item.wrong {
            border-left: 6px solid #c5283d;
            background: #fff6f7;
        }
        .q-item.correct-highlight {
            border-left: 6px solid #1f7b4d;
            background: #f2faf6;
        }
        .q-item.unanswered {
            border-left: 6px solid #f5a623;
            background: #fffcf0;
        }
        .q-num {
            min-width: 2.6rem;
            font-weight: 600;
            color: #1f3a6b;
            font-size: 0.9rem;
            padding-top: 0.1rem;
        }
        .q-body {
            flex: 1;
            min-width: 200px;
        }
        .q-text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: #0d1d30;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem 1.4rem;
            font-size: 0.95rem;
        }
        .options label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 0.1rem 0.3rem;
            border-radius: 30px;
            transition: 0.05s;
        }
        .options input[type="radio"] {
            accent-color: #1f3a6b;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .options label.selected-option {
            background: #e3edfc;
            border-radius: 30px;
            padding: 0.1rem 0.7rem 0.1rem 0.3rem;
        }
        .q-item .tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            margin-left: 6px;
            display: inline-block;
        }
        .tag.wrong-tag { background: #c5283d; color: white; }
        .tag.correct-tag { background: #1f7b4d; color: white; }
        .tag.unanswered-tag { background: #f5a623; color: white; }

        .error-book {
            margin-top: 2rem;
            background: #fcf2f4;
            border-radius: 28px;
            padding: 1.2rem 2rem;
            border: 1px solid #f0d3d8;
        }
        .error-book summary {
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            color: #a02030;
        }
        .error-item {
            background: white;
            border-radius: 18px;
            padding: 0.8rem 1.2rem;
            border-left: 6px solid #c5283d;
            margin-bottom: 0.6rem;
        }
        .error-item .e-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 1rem;
            font-weight: 600;
        }
        .error-item .e-question {
            font-weight: 500;
            margin: 0.3rem 0;
        }
        .error-item .e-detail {
            font-size: 0.92rem;
            background: #f8f4f6;
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            margin-top: 0.3rem;
            color: #1f2f44;
        }
        .error-item .e-detail .label {
            font-weight: 600;
            color: #a02030;
        }
        .error-item .e-detail .correct-label {
            color: #1f7b4d;
        }
        .error-item .e-detail .analysis {
            margin-top: 0.3rem;
            padding-top: 0.3rem;
            border-top: 1px dashed #d0c4c8;
            color: #1f3a5a;
        }
        .footnote {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #4d677f;
            border-top: 1px dashed #cddbea;
            padding-top: 1rem;
        }
        @media (max-width: 600px) {
            .paper { padding: 1.2rem; }
            .options { gap: 0.1rem 0.6rem; }
            .q-item { padding: 0.6rem 0.8rem; }
            .header h1 { font-size: 1.5rem; }
            .stats { gap: 0.4rem 1rem; padding: 0.4rem 1rem; }
        }
    </style>
</head>
<body>
<div class="paper" id="top">
    <div class="header">
        <h1>📝 中考·120题 <span style="font-size:0.9rem; font-weight:400; color:#3c5a7a;">错题本+解析</span></h1>
        <span class="meta">数学·语文·英语 各40题</span>
    </div>
    <div class="stats">
        <span>📐 数学 <span class="num" id="mathCount">40</span></span>
        <span>📖 语文 <span class="num" id="chineseCount">40</span></span>
        <span>🌎 英语 <span class="num" id="englishCount">40</span></span>
        <span>✅ 已答 <span class="num" id="answeredCount">0</span>/120</span>
        <span>❌ 错题+未答 <span class="num" id="wrongCount">0</span> <span class="badge-error">错题本</span></span>
    </div>

    <div class="action-bar">
        <div class="left">
            <button class="btn btn-outline" id="clearAllBtn">清空答案</button>
            <button class="btn btn-primary" id="submitBtn">提交 · 查看得分</button>
            <button class="btn btn-danger" id="showWrongBtn">📕 显示错题本</button>
        </div>
        <div class="result-box" id="resultBox" style="display: none;">
            🎯 得分 <span class="score" id="scoreDisplay">0</span> / 120
        </div>
    </div>

    <div id="questionContainer" class="question-grid"></div>

    <!-- 错题本 -->
    <div class="error-book" id="errorBook" style="display: none;">
        <details open id="errorDetails">
            <summary>📕 错题本 · <span id="errorCountBadge">0</span> 道（含未答）</summary>
            <div id="errorList" style="margin-top: 0.8rem;"></div>
            <div style="margin-top: 0.8rem; display: flex; flex-wrap: wrap; gap: 8px;">
                <button class="btn btn-success" id="retryWrongBtn">🔄 重新练习错题</button>
                <button class="btn btn-outline" id="clearWrongBtn">清空错题本</button>
            </div>
        </details>
    </div>

    <div class="footnote">
        ⚡ 提交后自动收录错题与未答题 · 每题均含解析
    </div>
</div>

<script>
    (function() {
        // ---------- 题库 (数学40, 语文40, 英语40) 增加解析字段 ----------
        function makeMathPool() {
            return [
                { q: '方程 x² - 4x + 3 = 0 的两个根分别是？', opts: ['A. 1, 3', 'B. -1, -3', 'C. 1, -3', 'D. -1, 3'], ans: 0, analysis: '因式分解 (x-1)(x-3)=0，得 x=1 或 x=3。' },

                { q: '一元二次方程 x² - 6x + 9 = 0 的解的情况是？', opts: ['A. 两个不等实根', 'B. 两个相等实根', 'C. 无实根', 'D. 无法确定'], ans: 1, analysis: 'Δ=(-6)²-4×1×9=0，故有两个相等实根。' },
                { q: '二次函数 y = -x² + 4x - 3 的对称轴是？', opts: ['A. x = 2', 'B. x = -2', 'C. x = 4', 'D. x = -4'], ans: 0, analysis: '对称轴 x=-b/(2a) = -4/(2×-1)=2。' },

                    <div class="q-body">
                        <div class="q-text">${q.text}</div>
                        <div class="options">${optsHtml}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // 绑定 change
        document.querySelectorAll('input[type="radio"]').forEach(input => {
            input.addEventListener('change', function(e) {
                const qid = parseInt(this.dataset.qid);
                const val = parseInt(this.value);
                userAnswers[qid - 1] = val;
                updateAnsweredCount();
                const parent = this.closest('.options');
                parent.querySelectorAll('label').forEach(lb => lb.classList.remove('selected-option'));
                this.closest('label').classList.add('selected-option');
                if (submitted) {
                    markQuestion(qid);
                }
                updateErrorBook();
            });
        });

        function updateAnsweredCount() {
            const count = userAnswers.filter(a => a !== null).length;
            document.getElementById('answeredCount').textContent = count;
        }

        function markQuestion(qid) {
            const idx = qid - 1;
            const q = finalQuestions[idx];
            const userAns = userAnswers[idx];
            const item = document.getElementById(`qitem-${qid}`);
            if (!item) return;
            item.classList.remove('wrong', 'correct-highlight', 'unanswered');
            const oldTag = item.querySelector('.tag');
            if (oldTag) oldTag.remove();

            if (userAns === null) {
                // 未答：加入错题本
                item.classList.add('unanswered');
                const tag = document.createElement('span');
                tag.className = 'tag unanswered-tag';
                tag.textContent = '⏳ 未答';
                item.querySelector('.q-num').after(tag);
                wrongIds.add(qid);
                return;
            }
            const isCorrect = (userAns === q.ans);
            if (isCorrect) {
                item.classList.add('correct-highlight');
                const tag = document.createElement('span');
                tag.className = 'tag correct-tag';
                tag.textContent = '✓ 正确';
                item.querySelector('.q-num').after(tag);
                if (wrongIds.has(qid)) wrongIds.delete(qid);
            } else {
                item.classList.add('wrong');
                const tag = document.createElement('span');
                tag.className = 'tag wrong-tag';
                tag.textContent = '✗ 错误';
                item.querySelector('.q-num').after(tag);
                wrongIds.add(qid);
            }
            updateWrongCount();
            updateErrorBook();
        }

        function markAll() {
            for (let i = 0; i < finalQuestions.length; i++) {
                markQuestion(i + 1);
            }
        }

        function updateWrongCount() {
            document.getElementById('wrongCount').textContent = wrongIds.size;
            document.getElementById('errorCountBadge').textContent = wrongIds.size;
        }

        // 更新错题本（含解析）
        function updateErrorBook() {
            const errorList = document.getElementById('errorList');
            if (wrongIds.size === 0) {
                errorList.innerHTML = '<p style="color:#4d677f; padding:0.4rem 0;">🎉 暂无错题和未答题！</p>';
                return;
            }
            let html = '';
            const sorted = Array.from(wrongIds).sort((a,b) => a - b);
            for (const qid of sorted) {
                const q = finalQuestions[qid - 1];
                const userAns = userAnswers[qid - 1];
                const correctLetter = String.fromCharCode(65 + q.ans);
                const userLetter = userAns !== null ? String.fromCharCode(65 + userAns) : '未答';
                const status = userAns === null ? '⏳ 未答' : (userAns === q.ans ? '✓ 正确' : '✗ 错误');
                html += `
                    <div class="error-item">
                        <div class="e-header">
                            <span>${qid}.</span>
                            <span>${q.subject}</span>
                            <span style="background:#f0e6e8; padding:0.1rem 0.8rem; border-radius:30px; font-size:0.85rem;">
                                你的答案: ${userLetter}  | 正确答案: ${correctLetter}
                            </span>
                            <span style="font-weight:600; color:${userAns === null ? '#f5a623' : (userAns === q.ans ? '#1f7b4d' : '#c5283d')};">${status}</span>
                        </div>
                        <div class="e-question">${q.text}</div>
                        <div class="e-detail">
                            <div><span class="label">📌 解析：</span>${q.analysis}</div>
                            ${userAns !== null && userAns !== q.ans ? `<div class="analysis"><span class="correct-label">✅ 正确思路：</span>${q.analysis}</div>` : ''}
                            ${userAns === null ? `<div class="analysis"><span style="color:#f5a623;">💡 提示：</span>请作答后查看解析。</div>` : ''}
                        </div>
                    </div>
                `;
            }
            errorList.innerHTML = html;
        }

        // 提交
        document.getElementById('submitBtn').addEventListener('click', function() {
            submitted = true;
            let correct = 0;
            for (let i = 0; i < finalQuestions.length; i++) {
                const userAns = userAnswers[i];
                if (userAns !== null && userAns === finalQuestions[i].ans) {
                    correct++;
                }
            }
            document.getElementById('scoreDisplay').textContent = correct;
            document.getElementById('resultBox').style.display = 'inline-flex';
            markAll();
            document.getElementById('errorBook').style.display = 'block';
            document.getElementById('errorDetails').open = true;
            document.getElementById('errorBook').scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // 清空答案
        document.getElementById('clearAllBtn').addEventListener('click', function() {
            if (!confirm('清空所有答案？已提交的标记也会清除。')) return;
            document.querySelectorAll('input[type="radio"]').forEach(input => {
                input.checked = false;
                input.closest('label')?.classList.remove('selected-option');
            });
            for (let i = 0; i < userAnswers.length; i++) userAnswers[i] = null;
            submitted = false;
            wrongIds.clear();
            document.querySelectorAll('.q-item').forEach(item => {
                item.classList.remove('wrong', 'correct-highlight', 'unanswered');
                const tag = item.querySelector('.tag');
                if (tag) tag.remove();
            });
            document.getElementById('resultBox').style.display = 'none';
            updateAnsweredCount();
            updateWrongCount();
            updateErrorBook();
            document.getElementById('errorBook').style.display = 'none';
        });

        // 显示错题本
        document.getElementById('showWrongBtn').addEventListener('click', function() {
            const book = document.getElementById('errorBook');
            if (book.style.display === 'none') {
                book.style.display = 'block';
                document.getElementById('errorDetails').open = true;
                book.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                book.style.display = 'none';
            }
        });

        // 重练错题
        document.getElementById('retryWrongBtn').addEventListener('click', function() {
            if (wrongIds.size === 0) {
                alert('当前没有错题或未答题！');
                return;
            }
            for (const qid of wrongIds) {
                const idx = qid - 1;
                userAnswers[idx] = null;
                const input = document.querySelector(`input[name="q${qid}"]:checked`);
                if (input) {
                    input.checked = false;
                    input.closest('label')?.classList.remove('selected-option');
                }
                const item = document.getElementById(`qitem-${qid}`);
                if (item) {
                    item.classList.remove('correct-highlight', 'wrong', 'unanswered');
                    const tag = item.querySelector('.tag');
                    if (tag) tag.remove();
                    item.classList.add('unanswered');
                    const newTag = document.createElement('span');
                    newTag.className = 'tag unanswered-tag';
                    newTag.textContent = '⏳ 待重练';
                    item.querySelector('.q-num').after(newTag);
                }
            }
            wrongIds.clear();
            // 但未答的仍然需要加入错题本（重练后未答也要记录）
            // 我们重新扫描所有题目，将未答的加入错题本
            for (let i = 0; i < finalQuestions.length; i++) {
                if (userAnswers[i] === null) {
                    wrongIds.add(i + 1);
                }
            }
            updateWrongCount();
            updateErrorBook();
            updateAnsweredCount();
            document.getElementById('resultBox').style.display = 'none';
            submitted = false;
            alert('错题已清空，请重新作答。作答后再次提交即可。');
        });

        // 清空错题本
        document.getElementById('clearWrongBtn').addEventListener('click', function() {
            if (wrongIds.size === 0) {
                alert('错题本已是空的。');
                return;
            }
            if (!confirm('确定清空错题本吗？（不会清除试卷答案）')) return;
            wrongIds.clear();
            document.querySelectorAll('.q-item.wrong, .q-item.unanswered').forEach(item => {
                item.classList.remove('wrong', 'unanswered');
                const tag = item.querySelector('.tag');
                if (tag) tag.remove();
            });
            updateWrongCount();
            updateErrorBook();
        });

        // 初始统计
        document.getElementById('mathCount').textContent = mathSelected.length;
        document.getElementById('chineseCount').textContent = chineseSelected.length;
        document.getElementById('englishCount').textContent = englishSelected.length;
        updateAnsweredCount();
        updateWrongCount();
        updateErrorBook();
        document.getElementById('errorBook').style.display = 'none';

        if (window.location.hash === '#error') {
            document.getElementById('errorBook').style.display = 'block';
            document.getElementById('errorDetails').open = true;
        }
    })();
</script>
</body>
</html>
